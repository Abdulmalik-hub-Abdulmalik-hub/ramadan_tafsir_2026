name: Flutter Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Install Dependencies
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
          elif [ -f "RamadanTafsirApp/pubspec.yaml" ]; then
            cd RamadanTafsirApp && flutter pub get
          else
            echo "Error: pubspec.yaml not found!"
            exit 1
          fi

      - name: Build APK
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter build apk --release --no-tree-shake-icons
          else
            cd RamadanTafsirApp && flutter build apk --release --no-tree-shake-icons
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ramadan-tafsir-app-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            RamadanTafsirApp/build/app/outputs/flutter-apk/app-release.apk
