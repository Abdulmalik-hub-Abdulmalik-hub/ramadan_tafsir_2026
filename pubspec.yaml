name: tafseer_2026_sheikh_sani_aja
description: "Tafseer 2026 Sheikh Sani Aja - Streaming and Offline Tafsir App for Ramadan. Listen to beautiful Islamic lectures and tafsir from Sheikh Abdulmalik Isyaku Rabiu (Sani Aja)."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  font_awesome_flutter: ^10.7.0
  provider: ^6.1.1
  dio: ^5.4.1
  path_provider: ^2.1.2
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/image/
